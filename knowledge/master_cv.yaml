professional_profiles:

  retail:

    title: Atención al cliente

    summary: >
      Persona responsable, organizada y comprometida, con facilidad para aprender y adaptarse a nuevos entornos de trabajo. Destaco por mi actitud proactiva, mi capacidad para trabajar en equipo y mi orientación al cliente, ofreciendo siempre
      un trato cercano, amable y profesional. Me gusta mantener el orden, realizar las tareas con atención al detalle y colaborar para que el trabajo se desarrolle de forma eficiente, contribuyendo a un buen ambiente laboral.

  administrativo:

    title: Auxiliar Administrativo

    summary: >
      Profesional con formación en administración y sistemas informáticos, experiencia en gestión de expedientes, facturación, documentación jurídica y soporte a usuarios. Acostumbrado a trabajar con CRM, herramientas ofimáticas y procedimientos administrativos.

  informatico:

    title: Técnico Informático

    summary: >
      Técnico informático con experiencia en
      configuración y administración de servidores,
      soporte técnico de primer nivel,
      resolución de incidencias,
      documentación técnica
      y asistencia a usuarios.


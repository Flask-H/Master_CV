    description: "Persona responsable, organizada y comprometida, con facilidad para aprender y adaptarse a nuevos entornos de trabajo. Destaco por mi actitud proactiva, mi capacidad para trabajar en equipo y mi orientación al cliente, ofreciendo siempre un trato cercano, amable y profesional. Me gusta mantener el orden, realizar las tareas con atención al detalle y colaborar para que el trabajo se desarrolle de forma eficiente, contribuyendo a un buen ambiente laboral."
  - id: "perfil_it_sistemas"
    description: "Técnico informático con experiencia en configuración y administración de servidores web y gestión de datos. Ofrezco un perfil versátil y resolutivo, con capacidad para adaptarme rápidamente a nuevos entornos. Cuento con experiencia en soporte técnico de nivel básico e intermedio, especialmente en entornos Windows y Magento 2, realizando resolución de incidencias, asistencia remota y documentación técnica y functional. He trabajado atendiendo incidencias de hardware básico (periféricos) y soporte a nivel usuario."
  - id: "perfil_mixto_gestion_it"
    description: "Profesional con formación en administración y sistemas informáticos, experiencia en gestión de expedientes, facturación, documentación jurídica y soporte a usuarios. Acostumbrado a trabajar con CRM, herramientas ofimáticas y procedimientos administrativos, destacando por mi organización, capacidad de aprendizaje, atención al detalle y orientación a la mejora de procesos."

